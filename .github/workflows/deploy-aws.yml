name: deploy-aws

# MCP + 검색엔진을 AWS Lightsail(기존 tan-kim 서버)에 배포.
# main 브랜치에서 서버 관련 코드가 바뀌면 rsync로 서버에 복사 후 docker compose 재빌드.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "infra/**"
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-aws.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Typecheck
        run: |
          npm install
          npm run typecheck

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.AWS_HOST }}" >> ~/.ssh/known_hosts

      # 서버의 ~/namuwiki-search-mcp 로 소스 동기화.
      # .env, node_modules, data 는 제외 (서버에 수동 배치/볼륨 유지).
      - name: Rsync to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='data' \
            --exclude='.env' \
            --exclude='dist' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }}:~/namuwiki-search-mcp/"

      # 서버에서 재빌드 후 기동. --remove-orphans로 이름 바뀐 컨테이너 정리.
      - name: Build and restart containers
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }}" \
            'cd ~/namuwiki-search-mcp && \
             docker compose -f infra/docker-compose.yml build && \
             docker compose -f infra/docker-compose.yml up -d --remove-orphans'
