name: deploy-oracle

# MCP + 검색엔진을 Oracle Cloud(tan-kim 서버)에 배포.
# main 브랜치에서 서버 관련 코드가 바뀌면 서버가 git pull 후 docker compose 재빌드.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "infra/**"
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-oracle.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Typecheck
        run: |
          npm install
          npm run typecheck

      # 서버가 직접 git pull 후 재빌드. (.env는 gitignore라 reset --hard가 건드리지 않음)
      #  ⚠️ up -d는 api 컨테이너를 재생성하므로, 서버에서 SQLite 색인(npm run index)이
      #     진행 중일 때 이 워크플로가 돌면 색인이 중단된다. 색인 중에는 push/배포 금지.
      - name: Deploy via git pull
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd ~/namuwiki-search-mcp
            git fetch --prune origin
            git reset --hard origin/main
            docker compose -f infra/docker-compose.yml build
            docker compose -f infra/docker-compose.yml up -d --remove-orphans
