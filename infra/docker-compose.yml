# AWS Lightsail 배포용 compose (tan-kim 서버에 함께 올라간다).
#
# 구성:
#   - meilisearch : 검색 엔진. 내부 네트워크 + Vercel REST API가 Caddy 통해 접근.
#   - api         : 내부 REST API. MCP 서버 전용(외부 노출 안 함).
#   - mcp         : MCP HTTP 서버. Claude 클라이언트가 Caddy 통해 접근.
#
# 외부 노출(TLS)은 기존 tan-kim Caddy를 재사용한다. (이 compose엔 Caddy 없음)
# 포트는 모두 .env에서 주입한다 (기존 서버의 사용 중 포트와 충돌 방지).
#
# ⚠️ 외부 노출 경로(Caddy 연동)는 두 가지 중 하나를 선택해야 한다 — README 참고.
services:
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: namu-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    networks:
      - namu-internal
      # Vercel REST API가 Caddy(/namuwiki-meili)를 통해 접근하므로 공유 네트워크 연결.
      - caddy-shared

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: namu-api
    restart: unless-stopped
    command: ["npm", "run", "api"]
    environment:
      SEARCH_ENGINE: meilisearch
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY}
      MEILISEARCH_INDEX: ${MEILISEARCH_INDEX:-namuwiki}
      API_PORT: "3000"
    depends_on:
      - meilisearch
    networks:
      - namu-internal

  mcp:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: namu-mcp
    restart: unless-stopped
    command: ["npm", "run", "mcp"]
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: "3001"
      # MCP는 같은 네트워크의 내부 API를 직접 호출한다 (Vercel 왕복 없음).
      API_BASE_URL: http://api:3000
    depends_on:
      - api
    networks:
      - namu-internal
      # Claude 클라이언트가 Caddy(/namuwiki)를 통해 접근하므로 공유 네트워크 연결.
      - caddy-shared

networks:
  namu-internal:
  # 기존 tan-kim Caddy가 속한 네트워크를 외부 네트워크로 참조한다.
  # ⚠️ 실제 네트워크명은 서버에서 `docker network ls`로 확인 후 교체할 것.
  #    (tan-kim compose가 infra/ 에서 실행되면 보통 infra_internal)
  caddy-shared:
    external: true
    name: infra_internal

volumes:
  meili_data:
