# Oracle Cloud 배포용 compose (tan-kim 서버에 함께 올라간다).
#
# 저장소 역할 분리:
#   - SQLite (named volume namu-data) : 검색 데이터(documents). 덤프라 재색인 가능.
#   - MySQL  (AWS RDS, cross-cloud 유지) : API 키(api_keys) + 사용 로그(usage_logs).
#                                        유실되면 안 되는 영속 데이터. Oracle→RDS 인터넷 연결이므로
#                                        RDS 보안그룹에 Oracle 공인 IP의 3306 인바운드를 허용해야 한다.
#   인덱싱은 서버에서 1회 실행한다(아래 DEPLOY.md 참고).
#
#   - api : REST API. SQLite 검색 + MySQL 인증/로그를 수행.
#           호스트 nginx가 api.tan-kim.com/namuwiki 로 공개 노출한다.
#   - mcp : MCP HTTP 서버. Claude 클라이언트가 mcp.tan-kim.com/namuwiki(Bearer)로 접근.
#
# 외부 노출(TLS)은 호스트의 nginx(+Cloudflare Origin Cert)가 담당한다.
# 시크릿(MYSQL_PASSWORD, ADMIN_API_TOKEN 등)은 infra/.env에서 주입한다.
name: namuwiki
services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: namu-api
    restart: unless-stopped
    command: ["npm", "run", "api"]
    environment:
      SEARCH_ENGINE: sqlite
      # 영속 볼륨(/data) 위의 SQLite 파일. 검색 데이터(documents)만 들어간다.
      SQLITE_DB_PATH: /data/namuwiki.db
      # API 키·사용 로그용 MySQL (영속). 검색과 별개로 항상 연결한다.
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-namuwiki}
      API_PORT: "3000"
      # API 키 인증/발급 (MySQL api_keys 테이블). 운영은 키 필수.
      REQUIRE_API_KEY: ${REQUIRE_API_KEY:-true}
      # 발급/폐기 엔드포인트(/admin/keys) 보호 토큰. 미설정 시 발급 비활성.
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
      # 부하 보호 (선택 — 미지정 시 코드 기본값 사용)
      CACHE_MAX_ENTRIES: ${CACHE_MAX_ENTRIES:-5000}
      CACHE_TTL_MS: ${CACHE_TTL_MS:-300000}
      MAX_CONCURRENT: ${MAX_CONCURRENT:-20}
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-8000}
      API_KEY_CACHE_TTL_MS: ${API_KEY_CACHE_TTL_MS:-60000}
    volumes:
      # SQLite DB 영속화. 인덱싱 결과(수십 GB)가 여기 쌓인다.
      - namu-data:/data
    ports:
      - "127.0.0.1:3000:3000" # 호스트 nginx만 접근 (외부 직접 노출 금지)
    networks:
      - namu-internal

  mcp:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: namu-mcp
    restart: unless-stopped
    command: ["npm", "run", "mcp"]
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: "3001"
      # MCP는 같은 네트워크의 내부 API를 직접 호출한다(공개 경로를 거치지 않음).
      API_BASE_URL: http://api:3000
    ports:
      # 컨테이너 3001 → 호스트 127.0.0.1:3011 (rag-embed의 호스트 3001과 충돌 회피)
      - "127.0.0.1:3011:3001"
    depends_on:
      - api
    networks:
      - namu-internal

volumes:
  # SQLite DB 영속 볼륨. 디스크가 부족하면 블록스토리지를 이 볼륨 경로에
  # 마운트하거나, driver_opts로 특정 디바이스를 가리키도록 변경한다.
  namu-data:

networks:
  namu-internal:
