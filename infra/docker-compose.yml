# AWS Lightsail 배포용 compose (tan-kim 서버에 함께 올라간다).
#
# 검색 백엔드: AWS RDS(MySQL, InnoDB FULLTEXT + ngram).
#   - api : REST API. RDS에 연결해 검색 수행.
#           caddy-config의 Caddy가 api.tan-kim.com/namuwiki 로 공개 노출한다.
#           내부적으로는 mcp 컨테이너도 이 api를 호출한다(검색 로직 단일 소스).
#   - mcp : MCP HTTP 서버. Claude 클라이언트가 mcp.tan-kim.com/namuwiki(Bearer)로 접근.
#
# 외부 노출(TLS)은 별도 caddy-config 레포의 Caddy가 담당한다 (이 compose엔 Caddy 없음).
# RDS 자격증명 등은 infra/.env에서 주입한다 (rsync 제외 → 서버 수동 배치).
#
# name: 프로젝트명을 명시 고정한다. compose 파일 경로가 tan-kim과 동일해
#   명시하지 않으면 양쪽 프로젝트명이 "infra"로 충돌한다.
name: namuwiki
services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: namu-api
    restart: unless-stopped
    command: ["npm", "run", "api"]
    environment:
      SEARCH_ENGINE: mysql
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-namuwiki}
      API_PORT: "3000"
    networks:
      - namu-internal
      # Caddy(api.tan-kim.com/namuwiki)가 이 api를 공개 노출하므로 공유 네트워크 연결.
      - caddy-shared

  mcp:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: namu-mcp
    restart: unless-stopped
    command: ["npm", "run", "mcp"]
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: "3001"
      # MCP는 같은 네트워크의 내부 API를 직접 호출한다(공개 경로를 거치지 않음).
      API_BASE_URL: http://api:3000
    depends_on:
      - api
    networks:
      - namu-internal
      # Claude 클라이언트가 Caddy(mcp.tan-kim.com/namuwiki)를 통해 접근하므로 공유 네트워크 연결.
      - caddy-shared

networks:
  namu-internal:
  # 중립 공유 네트워크 "edge". caddy-config의 Caddy와 namuwiki(api/mcp)를 잇는 접점.
  # 어느 프로젝트도 소유하지 않는다(external) → compose down으로 삭제되지 않음.
  # 사전 생성 필요: `docker network create edge` (배포 스크립트가 멱등 생성).
  caddy-shared:
    external: true
    name: edge
